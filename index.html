let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth();
const today = new Date();

function pad(n){return n<10?'0'+n:n;}
function dateKey(m,d){return pad(m+1)+'/'+pad(d);}

function renderCalendar(){
  document.getElementById('month-label').textContent=currentYear+'年'+(currentMonth+1)+'月';
  const cal=document.getElementById('cal');
  cal.innerHTML='';
  ['日','一','二','三','四','五','六'].forEach(d=>{
    const h=document.createElement('div');h.className='cal-head';h.textContent=d;cal.appendChild(h);
  });
  const first=new Date(currentYear,currentMonth,1).getDay();
  const days=new Date(currentYear,currentMonth+1,0).getDate();
  for(let i=0;i<first;i++){const e=document.createElement('div');e.className='cal-day empty';cal.appendChild(e);}
  for(let d=1;d<=days;d++){
    const div=document.createElement('div');
    div.className='cal-day';
    div.textContent=d;
    const key=dateKey(currentMonth,d);
    if(data[key])div.classList.add('has-data');
    if(d===today.getDate()&&currentMonth===today.getMonth()&&currentYear===today.getFullYear())div.classList.add('today');
    div.onclick=()=>showDay(currentMonth,d);
    cal.appendChild(div);
  }
}

function showDay(m,d){
  document.querySelectorAll('.cal-day.selected').forEach(el=>el.classList.remove('selected'));
  const key=dateKey(m,d);
  const content=document.getElementById('content');
  if(!data[key]){content.innerHTML='<p>今天沒有題目。</p>';return;}
  const item=data[key];
  let html='<h2>'+pad(m+1)+'/'+pad(d)+' — '+item.q+'</h2><h3>思考方向</h3><ol>';
  item.points.forEach(p=>html+='<li>'+p+'</li>');
  html+='</ol><h3>追問</h3><ul>';
  item.follow.forEach(f=>html+='<li>'+f+'</li>');
  html+='</ul>';
  content.innerHTML=html;
  document.querySelectorAll('.cal-day').forEach(el=>{
    if(parseInt(el.textContent)===d&&!el.classList.contains('empty'))el.classList.add('selected');
  });
}

function changeMonth(dir){
  currentMonth+=dir;
  if(currentMonth>11){currentMonth=0;currentYear++;}
  if(currentMonth<0){currentMonth=11;currentYear--;}
  renderCalendar();
}

renderCalendar();
showDay(today.getMonth(),today.getDate());
